<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquatic Rhythm</title>
<meta name="theme-color" content="#041e28">
<script>
/* GitHub Pages SPA redirect
   Converts /path to /?p=path so index.html can route correctly */
(function(){
  var path = window.location.pathname;
  var search = window.location.search;
  /* If it's an article file, let it 404 properly */
  if(path.indexOf('/articles/') === 0) return;
  /* Redirect to index with path as query param */
  var redirect = '/?p=' + encodeURIComponent(path.replace(/^\//, '')) + (search ? '&' + search.slice(1) : '');
  window.location.replace(redirect);
})();
</script>
</head>
<body style="background:#020810"></body>
</html>
